<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artha AI - Finance Chat</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="chat-container">
        
        <!-- Header -->
        <h2>💰 Artha AI - Finance Chat</h2>

        <!-- Chat Box -->
        <div class="chat-box"></div>

        <!-- Input Area -->
        <div class="input-area">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Ask about SIP, PPF, investments..."
                onkeypress="if(event.key === 'Enter') sendMessage()"
            >
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>

        <!-- Optional PPF Calculator -->
        <div class="ppf-calculator">
            <h4>📊 PPF Calculator</h4>
            <input type="number" id="amount" placeholder="Enter Amount">
            <input type="number" id="rate" placeholder="Interest Rate (%)">
            <input type="number" id="years" placeholder="Years">
            <button onclick="calculatePPF()">Calculate</button>
            <p id="result"></p>
        </div>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
